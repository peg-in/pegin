name: CI

# Codeberg (Forgejo Actions) mirror of .github/workflows/ci.yml. Same Dockerfile,
# same Makefile targets — only the registry host and login secret differ.
#
# Required repo secrets: REGISTRY_TOKEN (Codeberg package write), and optionally
# PEGIN_MNEMONIC / PEGIN_DID for the on-chain smoke test.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: codeberg.org/${{ github.repository_owner }}/pegin-ci

jobs:
  image:
    name: CI image (toolchain + cached deps)
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login codeberg.org -u "${{ github.actor }}" --password-stdin

      - name: Set up Buildx
        run: docker buildx create --use --driver docker-container

      - name: Build and push CI image
        run: |
          docker buildx build \
            --file ci/Dockerfile \
            --target builder \
            --tag "$IMAGE:${{ github.sha }}" \
            --cache-from type=registry,ref=$IMAGE:buildcache \
            --cache-to type=registry,ref=$IMAGE:buildcache,mode=max \
            --push \
            .

  core:
    name: Core libraries — domain · identity · wallet · gateway
    needs: image
    runs-on: docker
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login codeberg.org -u "${{ github.actor }}" --password-stdin
      - name: Lint + test workspace
        run: docker run --rm "$IMAGE:${{ github.sha }}" make ci-core

  sdk-web:
    name: Login SDK & web apps
    needs: image
    runs-on: docker
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login codeberg.org -u "${{ github.actor }}" --password-stdin
      - name: Lint + build + test packages
        run: docker run --rm "$IMAGE:${{ github.sha }}" make ci-web

  browser-wallet:
    name: Browser wallet (WASM)
    needs: image
    runs-on: docker
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login codeberg.org -u "${{ github.actor }}" --password-stdin
      - name: Browser + smoke + SDK tests
        run: |
          docker run --rm --shm-size=2g \
            -e PEGIN_MNEMONIC -e PEGIN_DID \
            "$IMAGE:${{ github.sha }}" make ci-wasm
        env:
          PEGIN_MNEMONIC: ${{ secrets.PEGIN_MNEMONIC }}
          PEGIN_DID: ${{ vars.PEGIN_DID }}
