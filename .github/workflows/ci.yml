name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core libraries — domain · identity · wallet · gateway
    runs-on: ubuntu-latest

    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0" # sccache can't cache incremental builds; also keeps the cache small

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Compiler cache (sccache)
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry + git sources
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Lint (fmt)
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: sccache stats
        run: sccache --show-stats

  sdk-web:
    name: Login SDK & web apps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint && pnpm exec eslint "crates/**/*.mjs"

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

  browser-wallet:
    name: Browser wallet (WASM)
    runs-on: ubuntu-latest

    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Compiler cache (sccache)
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry + git sources
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # Cached prebuilt binary — avoids the curl install + recompile on every run.
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Runner images ship Chrome + chromedriver, which wasm-pack picks up.
      - name: Browser wallet tests (headless Chrome)
        run: wasm-pack test --headless --chrome crates/pegin-wasm

      # One build step for both consumer targets: the bundler build reuses the
      # release artifacts the node build just compiled (shared target dir).
      - name: Build wasm packages (node + bundler)
        run: pnpm build:wasm:node && pnpm build:wasm

      # On-chain flow via coinset.org testnet11; self-skips when the repository
      # secret/variable are unavailable, e.g. on fork PRs. No rebuild — uses pkg-node.
      - name: On-chain smoke test (Node)
        run: pnpm smoke
        env:
          PEGIN_MNEMONIC: ${{ secrets.PEGIN_MNEMONIC }}
          PEGIN_DID: ${{ vars.PEGIN_DID }}

      - name: Login SDK tests against fresh wasm
        run: pnpm --filter @pegin/sdk test

      - name: sccache stats
        run: sccache --show-stats
