name: CI

# Thin wrapper around ci/Dockerfile + Makefile. No marketplace toolchain actions —
# run locally via `make ci-docker`.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pegin-ci

jobs:
  image:
    name: Build CI image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Buildx
        run: docker buildx create --use --driver docker-container

      - name: Build and push
        run: |
          docker buildx build \
            --file ci/Dockerfile \
            --target builder \
            --tag "$IMAGE:${{ github.sha }}" \
            --cache-from type=registry,ref=$IMAGE:buildcache \
            --cache-to type=registry,ref=$IMAGE:buildcache,mode=max \
            --push \
            .

  core:
    name: Rust — fmt · clippy · test
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: docker run --rm "$IMAGE:${{ github.sha }}" make ci-core

  sdk-web:
    name: TypeScript — lint · build · test
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: docker run --rm "$IMAGE:${{ github.sha }}" make ci-web

  browser-wallet:
    name: WASM — browser test · build · smoke · SDK
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: |
          docker run --rm --shm-size=2g \
            -e PEGIN_MNEMONIC -e PEGIN_DID \
            "$IMAGE:${{ github.sha }}" make ci-wasm
        env:
          PEGIN_MNEMONIC: ${{ secrets.PEGIN_MNEMONIC }}
          PEGIN_DID: ${{ vars.PEGIN_DID }}
