name: CI

# Rust: build once → fmt / clippy / test reuse the same cached target/ dir.
# TypeScript + WASM: one job builds wasm, then runs the JS build/lint/tests + browser tests.
# No Docker — Swatinem/rust-cache shares compiled deps across jobs via a shared key.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_CACHE_KEY: pegin-rust-v1

# PEGIN_JWT_HKDF_SALT (build.rs salt embed) is scoped to the jobs/steps that compile
# pegin-jwt — never at workflow level, so rust-fmt, pnpm install, lint, and smoke
# steps never see the secret.

jobs:
  rust-build:
    name: Rust build
    runs-on: ubuntu-latest
    env:
      PEGIN_JWT_HKDF_SALT: ${{ secrets.PEGIN_JWT_HKDF_SALT }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_KEY }}
          cache-on-failure: true

      - name: Build workspace (native + wasm test deps)
        run: |
          cargo build --workspace --tests
          cargo build -p pegin-wasm --target wasm32-unknown-unknown --tests

  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust clippy
    needs: rust-build
    runs-on: ubuntu-latest
    env:
      PEGIN_JWT_HKDF_SALT: ${{ secrets.PEGIN_JWT_HKDF_SALT }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_KEY }}
          cache-on-failure: true

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust test
    needs: rust-build
    runs-on: ubuntu-latest
    env:
      PEGIN_JWT_HKDF_SALT: ${{ secrets.PEGIN_JWT_HKDF_SALT }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_KEY }}
          cache-on-failure: true

      - name: Test
        run: cargo test --workspace

  # TypeScript + WASM share one job: the web build/lint/tests need the wasm
  # artifacts, so building wasm first lets `pnpm -r build` compile sdk → demo-web
  # in dependency order (and the same install serves both).
  typescript:
    name: TypeScript + WASM
    needs: rust-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_KEY }}
          cache-on-failure: true

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Release wasm builds; test deps were warmed in rust-build.
      # Salt scoped to the two steps that compile pegin-jwt (via build.rs).
      - name: Build wasm packages (node + bundler)
        run: pnpm build:wasm:node && pnpm build:wasm
        env:
          PEGIN_JWT_HKDF_SALT: ${{ secrets.PEGIN_JWT_HKDF_SALT }}

      - name: Build, lint, and test (TS)
        run: pnpm -r build && pnpm -r lint && pnpm exec eslint "crates/**/*.mjs" && pnpm -r test

      - name: Browser wallet tests (headless Chrome)
        run: wasm-pack test --headless --chrome crates/pegin-wasm
        env:
          PEGIN_JWT_HKDF_SALT: ${{ secrets.PEGIN_JWT_HKDF_SALT }}

      - name: On-chain smoke test (Node)
        run: pnpm smoke
        env:
          PEGIN_MNEMONIC: ${{ secrets.PEGIN_MNEMONIC }}
          PEGIN_DID: ${{ vars.PEGIN_DID }}
