<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />

    <!-- Installable PWA — standalone display so passkey login runs without browser chrome (incl. iOS Home Screen). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b0e14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PEGIN" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>PEGIN Demo</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong scheme.
      const theme = localStorage.getItem('pegin-theme')
      if (theme === 'light' || theme === 'dark') document.documentElement.dataset.theme = theme
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/index.tsx"></script>
  </body>
</html>
